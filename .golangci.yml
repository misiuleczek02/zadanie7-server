run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - gocyclo
    - misspell
    - unconvert

linters-settings:
  gocyclo:
    min-complexity: 12
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-dirs:
    - vendor
  max-issues-per-linter: 0
  max-same-issues: 0
